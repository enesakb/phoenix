name: Release binaries

# Triggered when a tag matching v* is pushed (e.g. v0.8.0).
# Builds the phoenix-cli binary on Linux, Windows, and macOS, then attaches
# the artifacts to a GitHub Release that anyone can download — no Rust/Node
# installation required.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release (e.g. v0.8.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: phoenix-linux-x86_64
            binary: phoenix
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: phoenix-windows-x86_64.exe
            binary: phoenix.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: phoenix-macos-arm64
            binary: phoenix
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: phoenix-macos-x86_64
            binary: phoenix
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build CLI
        run: cargo build --release -p phoenix-cli --target ${{ matrix.target }}
      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.artifact }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
      - name: Flatten artifact tree
        run: |
          find dist -type f -exec mv {} dist/ \;
          ls -la dist/
      - name: Compute checksums
        working-directory: dist
        run: |
          sha256sum phoenix-* > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          prerelease: true
          files: |
            dist/phoenix-linux-x86_64
            dist/phoenix-windows-x86_64.exe
            dist/phoenix-macos-arm64
            dist/phoenix-macos-x86_64
            dist/SHA256SUMS.txt
